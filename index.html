<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Birdswood Secondary School Open Day Presentation</title>
</head>
<body>
    <div class="presentation">
        <div class="slides">
            <!-- Slide 1 -->
            <div class="slide active">
                <h1>Welcome to Birdswood Secondary School</h1>
                <img src="images/welcome.jpg" alt="Welcome Image">
            </div>
            <!-- Add more slides here -->
            <div class="slide">
                <h1>About Our School</h1>
                <img src="images/about.jpg" alt="About School">
            </div>
            <!-- Continue creating slides up to slide 13 -->
        </div>
        <button class="prev" onclick="changeSlide(-1)">&#10094;</button>
        <button class="next" onclick="changeSlide(1)">&#10095;</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
